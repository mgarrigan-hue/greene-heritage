<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <span class="site-title">☘ Greene Heritage</span>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="people.html">People</a>
        <a href="timeline.html" class="active">Timeline</a>

  <div class="container">
    <h2>Family Timeline</h2>
    <p>Key events in the Greene family story, from the 1830s to 1945.</p>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="modal-overlay" id="person-modal">
    <div class="modal" id="modal-content"></div>
  </div>

  <footer>
    <p>Greene Family Heritage Research &copy; 2026 | A project by Mark Garrigan</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    loadFamilyData().then(data => {
      const tl = document.getElementById('timeline');
      tl.innerHTML = data.events.map(e => `
        <div class="timeline-event">
          <div class="event-year">${e.year}</div>
          <div class="event-title">${e.title}</div>
          <div class="event-desc">${e.description}</div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
